<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">

    <link rel="icon" type="image/png" href="assets/icons/favicon.png">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@700&display=swap"

<body>
    <header>
        <div class="container nav-container">

                <ul class="nav-links">
                    <li><a href="index.html" data-i18n="nav-home">Home</a></li>
                    <li><a href="menu.html" data-i18n="nav-menu">Menu</a></li>

                    <!-- Map Placeholder -->
                    <div
                        style="width: 100%; height: 300px; background-color: #E0E0E0; border-radius: 8px; display: flex; align-items: center; justify-content: center; margin-bottom: 40px;">
