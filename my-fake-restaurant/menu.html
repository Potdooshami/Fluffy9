<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu - Cloud Fluff9</title>
    <link rel="icon" type="image/png" href="assets/icons/favicon.png">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <header>
        <div class="container nav-container">
            <a href="index.html" class="logo">Cloud Fluff9 ☁️</a>
            <nav>
                <button class="mobile-menu-btn" aria-label="Menu">☰</button>
                <ul class="nav-links">
                    <li><a href="index.html" data-i18n="nav-home">Home</a></li>
                    <li><a href="menu.html" data-i18n="nav-menu">Menu</a></li>
                    <li><a href="about.html" data-i18n="nav-about">About</a></li>
                    <li><a href="contact.html" data-i18n="nav-contact">Contact</a></li>
                </ul>
            </nav>
            <button class="lang-toggle" id="langToggle">EN</button>
        </div>
    </header>

    <main>
        <section class="section">
            <div class="container" style="text-align: center;">
                <h1 style="margin-bottom: 40px;" data-i18n="menu-title">The Menu</h1>

                <div
                    style="background: white; padding: 40px; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); max-width: 800px; margin: 0 auto; display: flex; flex-wrap: wrap; align-items: center; gap: 40px;">
                    <div style="flex: 1; min-width: 300px;">
                        <div
                            style="width: 100%; height: 300px; background-color: #EEE; display: flex; align-items: center; justify-content: center; border-radius: 4px;">
                            [Souffle Photo]
                        </div>
                    </div>
                    <div style="flex: 1; text-align: left; min-width: 300px;">
                        <h2 data-i18n="menu-item-title">The Standard Model Souffle</h2>
                        <p style="color: var(--color-brown); font-size: 1.1rem; margin: 20px 0;"
                            data-i18n="menu-item-desc">A perfectly symmetric composition of egg whites and sugar.</p>
                        <p style="font-family: var(--font-heading); font-size: 1.5rem; font-weight: bold; color: var(--color-dark-brown);"
                            data-i18n="menu-item-price">₩ 12,000</p>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <div id="global-footer"></div>

    <script src="js/data.js"></script>
    <script src="js/main.js"></script>
</body>

</html>
